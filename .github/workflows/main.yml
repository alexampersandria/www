name: main

on:
  workflow_dispatch:
  push:
    branches: ['main']

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: install
        run: bun install
      - name: lint
        run: bun run lint
      - name: check
        run: bun run check
      - name: build
        run: bun run build
      - name: test
        run: bun run test
